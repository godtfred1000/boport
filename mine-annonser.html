<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mine annonser | Boport</title>
  <link rel="icon" href="images/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .account-page {
      max-width: 1100px;
      margin: 64px auto;
      padding: 0 20px;
    }

    .account-header {
      align-items: flex-start;
      display: flex;
      gap: 16px;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .account-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .account-message {
      background: #fff;
      border: 1px solid #dfe7e5;
      border-radius: 16px;
      color: #08745f;
      font-weight: 800;
      margin: 18px 0;
      padding: 18px;
    }

    .account-message.error {
      color: #b83224;
    }

    .ad-list {
      display: grid;
      gap: 16px;
      margin-top: 18px;
    }

    .ad-card {
      align-items: center;
      background: #fff;
      border: 1px solid #dfe7e5;
      border-radius: 16px;
      box-shadow: 0 14px 35px rgba(26, 46, 51, 0.07);
      display: grid;
      gap: 18px;
      grid-template-columns: 1fr auto;
      padding: 22px;
    }

    .ad-card h2 {
      font-size: 23px;
      margin: 0 0 8px;
    }

    .ad-meta {
      color: #61727a;
      font-weight: 700;
      margin: 6px 0;
    }

    .status-pill {
      background: #eef7f4;
      border-radius: 999px;
      color: #1b8068;
      display: inline-flex;
      font-weight: 800;
      margin-bottom: 10px;
      padding: 6px 10px;
    }

    .status-pill.pending {
      background: #fff6df;
      color: #b26b00;
    }

    .status-pill.draft {
      background: #eef1f2;
      color: #61727a;
    }

    .ad-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .ad-actions a,
    .ad-actions button {
      border: 1px solid #dfe7e5;
      border-radius: 8px;
      background: #fff;
      color: #064e3b;
      cursor: pointer;
      display: inline-flex;
      font: inherit;
      font-weight: 800;
      min-height: 44px;
      align-items: center;
      padding: 0 14px;
      text-decoration: none;
    }

    .ad-actions .edit-button {
      background: #0f7b5f;
      border-color: #0f7b5f;
      color: #fff;
    }

    .empty-state {
      background: #fff;
      border: 1px solid #dfe7e5;
      border-radius: 16px;
      color: #61727a;
      font-weight: 700;
      padding: 28px;
    }

    @media (max-width: 760px) {
      .account-header,
      .ad-card {
        display: block;
      }

      .account-actions,
      .ad-actions {
        justify-content: flex-start;
        margin-top: 16px;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html" aria-label="Boport startside">
      <span class="logo-mark">B</span>
      <span>Boport</span>
    </a>
    <nav class="main-nav" aria-label="Hovedmeny">
      <a href="index.html">Forside</a>
      <a href="legg-ut-bolig.html">Legg ut bolig</a>
    </nav>
  </header>

  <main class="account-page">
    <div class="account-header">
      <div>
        <p class="eyebrow">Min side</p>
        <h1>Mine annonser</h1>
        <p>Her kan du redigere annonser som er knyttet til din innlogging.</p>
      </div>
      <div class="account-actions">
        <a class="search-button" href="legg-ut-bolig.html">Ny annonse</a>
        <button class="secondary-link" id="logout-button" type="button">Logg ut</button>
      </div>
    </div>

    <p id="account-message" class="account-message">Henter annonser...</p>
    <section id="ad-list" class="ad-list" aria-live="polite"></section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script>
    const client = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY);
    const adList = document.getElementById("ad-list");
    const message = document.getElementById("account-message");
    const logoutButton = document.getElementById("logout-button");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatPrice(property) {
      const value = property.price || property.monthly_rent;
      if (!value) return "Pris ikke satt";
      return `${new Intl.NumberFormat("nb-NO").format(Number(value))} kr`;
    }

    function getStatusText(property) {
      if (property.status === "approved" || property.approved === true) return "Godkjent";
      if (property.status === "draft") return "Utkast";
      return "Venter på godkjenning";
    }

    function getStatusClass(property) {
      if (property.status === "approved" || property.approved === true) return "approved";
      if (property.status === "draft") return "draft";
      return "pending";
    }

    function getLocation(property) {
      return [property.address, property.postal_code, property.city].filter(Boolean).join(", ") || "Adresse ikke satt";
    }

    function renderAds(properties) {
      if (!properties || !properties.length) {
        message.textContent = "Du har ingen annonser ennå.";
        adList.innerHTML = `<div class="empty-state">Ingen annonser funnet på din bruker.</div>`;
        return;
      }

      message.textContent = `Fant ${properties.length} annonser. Du kan redigere dem under.`;
      message.classList.remove("error");

      adList.innerHTML = properties.map((property) => `
        <article class="ad-card">
          <div>
            <span class="status-pill ${getStatusClass(property)}">${getStatusText(property)}</span>
            <h2>${escapeHtml(property.title || "Uten tittel")}</h2>
            <p class="ad-meta">${escapeHtml(getLocation(property))}</p>
            <p class="ad-meta">${escapeHtml(formatPrice(property))}</p>
          </div>
          <div class="ad-actions">
            <a class="edit-button" href="rediger-bolig.html?id=${encodeURIComponent(property.id)}">Rediger annonse</a>
            <a href="bolig.html?id=${encodeURIComponent(property.id)}" target="_blank" rel="noopener">Se annonse</a>
          </div>
        </article>
      `).join("");
    }

    async function loadMyAds() {
      try {
        message.textContent = "Sjekker innlogging...";

        const { data: sessionData, error: sessionError } = await client.auth.getSession();
        if (sessionError) throw sessionError;

        const user = sessionData.session?.user;
        if (!user) {
          window.location.href = `login.html?redirect=${encodeURIComponent("mine-annonser.html")}`;
          return;
        }

        message.textContent = "Henter dine annonser...";

        const { data, error } = await client
          .from("properties")
          .select("id, title, address, city, postal_code, price, monthly_rent, status, approved, created_at, user_id")
          .eq("user_id", user.id)
          .order("created_at", { ascending: false });

        if (error) throw error;
        renderAds(data || []);
      } catch (error) {
        console.error("Feil på Mine annonser:", error);
        message.textContent = `Kunne ikke hente annonsene: ${error.message || error}`;
        message.classList.add("error");
      }
    }

    logoutButton.addEventListener("click", async () => {
      await client.auth.signOut();
      window.location.href = "login.html";
    });

    loadMyAds();
  </script>
</body>
</html>
