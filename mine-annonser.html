<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mine annonser | Boport</title>
  <link rel="icon" href="images/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .account-page { max-width: 1100px; margin: 64px auto; padding: 0 20px; }
    .account-header { align-items: flex-start; display: flex; gap: 16px; justify-content: space-between; margin-bottom: 28px; }
    .account-actions { display: flex; flex-wrap: wrap; gap: 12px; }
    #account-message { background:#fff; border:1px solid #dfe7e5; border-radius:16px; color:#08745f; font-weight:800; margin:18px 0; padding:18px; }
    #account-message.error { color:#b83224; }
    #ads-box { display:block !important; margin-top:18px; }
    .my-ad-card { display:grid !important; grid-template-columns:1fr auto; align-items:center; gap:18px; background:#fff; border:1px solid #dfe7e5; border-radius:16px; box-shadow:0 14px 35px rgba(26,46,51,.07); padding:22px; margin:0 0 16px 0; }
    .my-ad-card h2 { font-size:23px; margin:0 0 8px; color:#15252b; }
    .my-ad-card p { margin:6px 0; color:#61727a; font-weight:700; }
    .status-pill { display:inline-flex; border-radius:999px; padding:6px 10px; margin-bottom:10px; font-weight:800; background:#eef7f4; color:#1b8068; }
    .status-pill.pending { background:#fff6df; color:#b26b00; }
    .my-ad-actions { display:flex; flex-wrap:wrap; gap:10px; justify-content:flex-end; }
    .my-ad-actions a { min-height:44px; display:inline-flex; align-items:center; padding:0 14px; border-radius:8px; border:1px solid #dfe7e5; color:#064e3b; background:#fff; font-weight:800; text-decoration:none; }
    .my-ad-actions a.edit { background:#0f7b5f; border-color:#0f7b5f; color:#fff; }
    @media (max-width:760px){ .account-header,.my-ad-card{display:block !important}.account-actions,.my-ad-actions{justify-content:flex-start;margin-top:16px} }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html" aria-label="Boport startside">
      <span class="logo-mark">B</span>
      <span>Boport</span>
    </a>
    <nav class="main-nav" aria-label="Hovedmeny">
      <a href="index.html">Forside</a>
      <a href="legg-ut-bolig.html">Legg ut bolig</a>
    </nav>
  </header>

  <main class="account-page">
    <div class="account-header">
      <div>
        <p class="eyebrow">Min side</p>
        <h1>Mine annonser</h1>
        <p>Her kan du redigere annonser som er knyttet til din innlogging.</p>
      </div>
      <div class="account-actions">
        <a class="search-button" href="legg-ut-bolig.html">Ny annonse</a>
        <button class="secondary-link" id="logout-button" type="button">Logg ut</button>
      </div>
    </div>

    <div id="account-message">Henter annonser...</div>
    <div id="ads-box"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script>
    const client = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY);
    const message = document.getElementById("account-message");
    const adsBox = document.getElementById("ads-box");
    const logoutButton = document.getElementById("logout-button");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatPrice(property) {
      const value = property.price || property.monthly_rent;
      if (!value) return "Pris ikke satt";
      return `${new Intl.NumberFormat("nb-NO").format(Number(value))} kr`;
    }

    function statusText(property) {
      if (property.approved === true || property.status === "approved") return "Godkjent";
      if (property.status === "draft") return "Utkast";
      return "Venter på godkjenning";
    }

    function statusClass(property) {
      return property.approved === true || property.status === "approved" ? "" : "pending";
    }

    function locationText(property) {
      return [property.address, property.postal_code, property.city].filter(Boolean).join(", ") || "Adresse ikke satt";
    }

    function drawAds(ads) {
      message.textContent = `Fant ${ads.length} annonser.`;

      if (!ads.length) {
        adsBox.innerHTML = `<div class="my-ad-card"><div><h2>Ingen annonser funnet</h2><p>Denne brukeren har ingen annonser ennå.</p></div></div>`;
        return;
      }

      adsBox.innerHTML = ads.map((ad) => {
        const id = encodeURIComponent(ad.id);
        return `
          <div class="my-ad-card">
            <div>
              <span class="status-pill ${statusClass(ad)}">${statusText(ad)}</span>
              <h2>${escapeHtml(ad.title || "Uten tittel")}</h2>
              <p>${escapeHtml(locationText(ad))}</p>
              <p>${escapeHtml(formatPrice(ad))}</p>
            </div>
            <div class="my-ad-actions">
              <a class="edit" href="rediger-bolig.html?id=${id}">Rediger annonse</a>
              <a href="bolig.html?id=${id}">Se annonse</a>
            </div>
          </div>`;
      }).join("");
    }

    async function loadMyAds() {
      try {
        message.textContent = "Sjekker innlogging...";
        adsBox.innerHTML = "";

        const { data: sessionData, error: sessionError } = await client.auth.getSession();
        if (sessionError) throw sessionError;

        const user = sessionData.session?.user;
        if (!user) {
          window.location.href = `login.html?redirect=${encodeURIComponent("mine-annonser.html")}`;
          return;
        }

        message.textContent = "Henter annonser...";
        const { data, error } = await client
          .from("properties")
          .select("id,title,address,city,postal_code,price,monthly_rent,status,approved,created_at,user_id")
          .eq("user_id", user.id)
          .order("created_at", { ascending: false });

        if (error) throw error;
        drawAds(data || []);
      } catch (error) {
        console.error("Mine annonser-feil:", error);
        message.textContent = `Kunne ikke hente annonsene: ${error.message || error}`;
        message.classList.add("error");
        adsBox.innerHTML = "";
      }
    }

    logoutButton.addEventListener("click", async () => {
      await client.auth.signOut();
      window.location.href = "login.html";
    });

    loadMyAds();
  </script>
</body>
</html>
