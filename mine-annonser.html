<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mine annonser | Boport</title>
  <link rel="icon" href="images/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .account-page {
      max-width: 1100px;
      margin: 64px auto;
      padding: 0 20px;
    }

    .account-header {
      align-items: flex-start;
      display: flex;
      gap: 16px;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .account-actions,
    .ad-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .account-message {
      background: #fff;
      border: 1px solid #dfe7e5;
      border-radius: 14px;
      color: #1b8068;
      font-weight: 800;
      margin: 0 0 18px;
      padding: 16px 18px;
    }

    .account-message.error {
      color: #b83224;
      border-color: #efb4ac;
    }

    .ad-list {
      display: grid;
      gap: 16px;
      margin-top: 18px;
    }

    .ad-card {
      background: #fff;
      border: 1px solid #dfe7e5;
      border-radius: 16px;
      box-shadow: 0 14px 35px rgba(26, 46, 51, 0.07);
      display: grid;
      gap: 18px;
      grid-template-columns: 1fr auto;
      padding: 22px;
    }

    .ad-card h2 {
      font-size: 24px;
      margin: 0 0 8px;
    }

    .ad-meta {
      color: #61727a;
      font-weight: 700;
      margin: 5px 0;
    }

    .status-pill {
      background: #eef7f4;
      border-radius: 999px;
      color: #1b8068;
      display: inline-flex;
      font-weight: 800;
      margin-bottom: 10px;
      padding: 6px 10px;
    }

    .status-pill.pending {
      background: #fff6df;
      color: #b26b00;
    }

    .status-pill.draft {
      background: #eef1f2;
      color: #61727a;
    }

    .edit-button {
      align-items: center;
      background: #1b8068;
      border-radius: 8px;
      color: #fff;
      display: inline-flex;
      font-weight: 800;
      min-height: 44px;
      padding: 0 18px;
      text-decoration: none;
    }

    .preview-button {
      align-items: center;
      background: #fff;
      border: 1px solid #dfe7e5;
      border-radius: 8px;
      color: #17483d;
      display: inline-flex;
      font-weight: 800;
      min-height: 44px;
      padding: 0 18px;
      text-decoration: none;
    }

    .empty-state {
      background: #fff;
      border: 1px solid #dfe7e5;
      border-radius: 16px;
      color: #61727a;
      font-weight: 700;
      padding: 28px;
    }

    @media (max-width: 760px) {
      .account-header,
      .ad-card {
        display: block;
      }

      .account-actions,
      .ad-actions {
        margin-top: 16px;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html" aria-label="Boport startside">
      <span class="logo-mark">B</span>
      <span>Boport</span>
    </a>
    <nav class="main-nav" aria-label="Hovedmeny">
      <a href="index.html">Forside</a>
      <a href="legg-ut-bolig.html">Legg ut bolig</a>
    </nav>
  </header>

  <main class="account-page">
    <div class="account-header">
      <div>
        <p class="eyebrow">Min side</p>
        <h1>Mine annonser</h1>
        <p>Her kan du redigere annonser som er knyttet til din innlogging.</p>
      </div>
      <div class="account-actions">
        <a class="search-button" href="legg-ut-bolig.html">Ny annonse</a>
        <button class="secondary-link" id="logout-button" type="button">Logg ut</button>
      </div>
    </div>

    <p id="account-message" class="account-message">Laster...</p>
    <section id="ad-list" class="ad-list" aria-live="polite"></section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script>
    const client = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY);
    const message = document.getElementById("account-message");
    const adList = document.getElementById("ad-list");
    const logoutButton = document.getElementById("logout-button");

    function setMessage(text, isError = false) {
      message.textContent = text;
      message.classList.toggle("error", isError);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatPrice(property) {
      const value = property.price || property.monthly_rent;
      if (!value) return "Pris ikke satt";
      return `${new Intl.NumberFormat("nb-NO").format(value)} kr`;
    }

    function statusText(property) {
      if (property.status === "approved" || property.approved === true) return "Godkjent";
      if (property.status === "draft") return "Utkast";
      return "Venter på godkjenning";
    }

    function statusClass(property) {
      if (property.status === "approved" || property.approved === true) return "approved";
      if (property.status === "draft") return "draft";
      return "pending";
    }

    function renderAds(properties) {
      if (!properties || properties.length === 0) {
        adList.innerHTML = `<div class="empty-state">Du har ingen annonser ennå.</div>`;
        return;
      }

      const html = properties.map((property) => {
        const id = encodeURIComponent(property.id);
        return `
          <article class="ad-card">
            <div>
              <span class="status-pill ${escapeHtml(statusClass(property))}">${escapeHtml(statusText(property))}</span>
              <h2>${escapeHtml(property.title || "Uten tittel")}</h2>
              <p class="ad-meta">${escapeHtml(property.address || "Adresse ikke satt")}</p>
              <p class="ad-meta">${escapeHtml([property.city, property.postal_code].filter(Boolean).join(", "))}</p>
              <p class="ad-meta">${escapeHtml(formatPrice(property))}</p>
            </div>
            <div class="ad-actions">
              <a class="edit-button" href="rediger-bolig.html?id=${id}">Rediger annonse</a>
              <a class="preview-button" href="bolig.html?id=${id}">Se annonse</a>
            </div>
          </article>
        `;
      }).join("");

      adList.innerHTML = html;
    }

    async function loadMyAds() {
      setMessage("Sjekker innlogging...");

      const { data: userData, error: userError } = await client.auth.getUser();
      const user = userData?.user;

      if (userError || !user) {
        console.error(userError);
        window.location.href = `login.html?redirect=${encodeURIComponent("mine-annonser.html")}`;
        return;
      }

      setMessage("Henter annonser...");

      const { data, error } = await client
        .from("properties")
        .select("id, title, address, city, postal_code, price, monthly_rent, status, approved, user_id, created_at")
        .eq("user_id", user.id)
        .order("created_at", { ascending: false });

      if (error) {
        console.error(error);
        setMessage(`Kunne ikke hente annonsene: ${error.message}`, true);
        return;
      }

      setMessage(`Fant ${data.length} annonser. Du kan redigere dem under.`);
      renderAds(data);
    }

    logoutButton.addEventListener("click", async () => {
      await client.auth.signOut();
      window.location.href = "login.html";
    });

    loadMyAds();
  </script>
</body>
</html>
