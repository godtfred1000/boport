<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boligannonse | Boport</title>
  <meta name="description" content="Se boligannonse på Boport.">
  <link rel="icon" href="images/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .detail-page {
      width: min(1180px, 88vw);
      margin: 42px auto 92px;
    }

    .back-link {
      display: inline-flex;
      margin-bottom: 22px;
      color: var(--brand-dark);
      font-weight: 800;
    }

    .detail-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.6fr) minmax(300px, 0.7fr);
      gap: 28px;
      align-items: start;
    }

    .detail-main,
    .contact-card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .detail-media {
      position: relative;
      background: #fff;
      border-bottom: 1px solid var(--line);
    }

    .detail-slider {
      display: flex;
      overflow-x: auto;
      scroll-behavior: smooth;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .detail-slider::-webkit-scrollbar {
      display: none;
    }

    .detail-slide {
      flex: 0 0 100%;
      display: grid;
      place-items: center;
      margin: 0;
      aspect-ratio: 16 / 10;
      background: #eef4f0;
      scroll-snap-align: start;
    }

    .detail-slide img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .detail-arrow {
      position: absolute;
      top: 50%;
      z-index: 2;
      display: grid;
      place-items: center;
      width: 48px;
      height: 48px;
      transform: translateY(-50%);
      color: var(--ink);
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--line);
      border-radius: 50%;
      box-shadow: 0 10px 24px rgba(23, 33, 38, 0.16);
      font-size: 2rem;
      line-height: 1;
      cursor: pointer;
    }

    .detail-arrow:hover {
      color: var(--brand-dark);
      background: #fff;
    }

    .detail-arrow:disabled {
      opacity: 0.35;
      cursor: default;
    }

    .detail-arrow.prev {
      left: 16px;
    }

    .detail-arrow.next {
      right: 16px;
    }

    .swipe-hint {
      display: none;
      margin: 0;
      padding: 10px 16px 0;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 800;
    }

    .detail-thumbs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 10px;
      border-top: 1px solid var(--line);
      scrollbar-width: thin;
    }

    .detail-thumb {
      flex: 0 0 92px;
      padding: 0;
      overflow: hidden;
      background: #fff;
      border: 2px solid transparent;
      border-radius: 8px;
      cursor: pointer;
    }

    .detail-thumb.active {
      border-color: var(--brand);
    }

    .detail-thumb img {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
    }

    .detail-content {
      padding: 28px;
    }

    .detail-price {
      margin: 0 0 6px;
      color: var(--brand-dark);
      font-size: clamp(2rem, 4vw, 3.1rem);
      font-weight: 900;
      line-height: 1;
    }

    .detail-title {
      margin: 0;
      font-size: clamp(1.8rem, 3vw, 2.6rem);
      line-height: 1.1;
    }

    .detail-location {
      margin: 10px 0 24px;
      color: var(--muted);
      font-size: 1.1rem;
      font-weight: 700;
    }

    .detail-facts {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin: 0 0 28px;
      padding: 18px 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .detail-facts dt {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .detail-facts dd {
      margin: 4px 0 0;
      font-size: 1.2rem;
      font-weight: 900;
    }

    .description {
      white-space: pre-wrap;
    }

    .contact-card {
      padding: 24px;
      position: sticky;
      top: 96px;
    }

    .contact-card h2 {
      margin: 0 0 18px;
    }

    .contact-card p {
      margin: 8px 0;
      color: var(--muted);
      font-weight: 700;
    }

    .contact-card strong {
      color: var(--ink);
    }

    .detail-message {
      padding: 28px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    @media (max-width: 900px) {
      .detail-page {
        width: min(94vw, 680px);
        margin: 28px auto 64px;
      }

      .detail-layout {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .contact-card {
        position: static;
      }

      .detail-slide {
        aspect-ratio: 4 / 3;
      }
    }

    @media (max-width: 560px) {
      .detail-page {
        width: 100%;
        margin: 0 auto 54px;
      }

      .back-link {
        margin: 14px 16px;
      }

      .detail-main,
      .detail-message {
        border-right: 0;
        border-left: 0;
        border-radius: 0;
        box-shadow: none;
      }

      .detail-content {
        padding: 20px 16px;
      }

      .detail-price {
        font-size: 1.8rem;
      }

      .detail-title {
        font-size: 1.55rem;
      }

      .detail-arrow {
        display: none;
      }

      .detail-location {
        margin-bottom: 18px;
        font-size: 1rem;
      }

      .swipe-hint {
        display: block;
      }

      .detail-thumbs {
        padding: 10px 16px 14px;
      }

      .detail-thumb {
        flex-basis: 72px;
      }

      .detail-facts {
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        padding: 14px 0;
      }

      .detail-facts dt {
        font-size: 0.72rem;
      }

      .detail-facts dd {
        font-size: 1rem;
      }

      .contact-card {
        margin: 0 16px;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html" aria-label="Boport startside">
      <span class="logo-mark">B</span>
      <span>Boport</span>
    </a>

    <nav class="main-nav" aria-label="Hovedmeny">
      <a href="index.html">Forside</a>
      <a href="legg-ut-bolig.html">Legg ut bolig</a>
    </nav>
  </header>

  <main class="detail-page">
    <a class="back-link" href="index.html">Tilbake til forsiden</a>
    <div id="property-detail" class="detail-message">Laster bolig...</div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script>
    const detail = document.getElementById("property-detail");
    const client = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY);
    const params = new URLSearchParams(window.location.search);
    const propertyId = params.get("id");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatPrice(property) {
      const formatter = new Intl.NumberFormat("nb-NO");

      if (property.listing_type === "rent" && property.monthly_rent) {
        return `${formatter.format(property.monthly_rent)} kr/mnd`;
      }

      if (property.price) {
        return `${formatter.format(property.price)} kr`;
      }

      return property.listing_type === "rent" ? "Pris etter avtale" : "Prisantydning kommer";
    }

    function getListingLabel(property) {
      return property.listing_type === "rent" ? "Leie" : "Salg";
    }

    async function loadProperty() {
      if (!propertyId) {
        detail.textContent = "Fant ikke annonsen.";
        return;
      }

      const { data: property, error } = await client
        .from("properties")
        .select("*")
        .eq("id", propertyId)
        .eq("status", "approved")
        .single();

      if (error || !property) {
        console.error(error);
        detail.textContent = "Fant ikke annonsen, eller den er ikke godkjent ennå.";
        return;
      }

      const { data: images } = await client
        .from("property_images")
        .select("image_url")
        .eq("property_id", propertyId);

      const imageUrls = (images || [])
        .map((image) => image.image_url)
        .filter(Boolean);

      if (!imageUrls.length) {
        imageUrls.push("images/hero-home.png");
      }

      const slides = imageUrls
        .map((imageUrl, index) => `
          <figure class="detail-slide" aria-label="Bilde ${index + 1} av ${imageUrls.length}">
            <img src="${escapeHtml(imageUrl)}" alt="Bilde ${index + 1} av boligen"${index === 0 ? "" : ' loading="lazy"'}>
          </figure>
        `)
        .join("");

      const thumbs = imageUrls
        .map((imageUrl, index) => `
          <button class="detail-thumb${index === 0 ? " active" : ""}" type="button" data-slide="${index}" aria-label="Vis bilde ${index + 1}">
            <img src="${escapeHtml(imageUrl)}" alt="">
          </button>
        `)
        .join("");
      const location = [property.address, property.city, property.postal_code].filter(Boolean).join(", ");

      detail.className = "detail-layout";
      detail.innerHTML = `
        <article class="detail-main">
          <div class="detail-media">
            <div class="detail-slider" id="detail-slider" aria-label="Bilder av boligen">
              ${slides}
            </div>
            ${imageUrls.length > 1 ? `
              <button class="detail-arrow prev" type="button" data-direction="-1" aria-label="Forrige bilde">‹</button>
              <button class="detail-arrow next" type="button" data-direction="1" aria-label="Neste bilde">›</button>
            ` : ""}
            ${imageUrls.length > 1 ? `<p class="swipe-hint">Sveip sideveis for å se flere bilder</p><div class="detail-thumbs">${thumbs}</div>` : ""}
          </div>
          <div class="detail-content">
            <p class="detail-price">${escapeHtml(formatPrice(property))}</p>
            <h1 class="detail-title">${escapeHtml(property.title)}</h1>
            <p class="detail-location">${escapeHtml(location || "Norge")}</p>

            <dl class="detail-facts">
              <div><dt>Soverom</dt><dd>${escapeHtml(property.bedrooms ?? "-")}</dd></div>
              <div><dt>Areal</dt><dd>${property.size_m2 ? `${escapeHtml(property.size_m2)} m²` : "-"}</dd></div>
              <div><dt>Type</dt><dd>${escapeHtml(getListingLabel(property))}</dd></div>
            </dl>

            <h2>Om boligen</h2>
            <p class="description">${escapeHtml(property.description || "Ingen beskrivelse lagt inn.")}</p>
          </div>
        </article>

        <aside class="contact-card">
          <h2>Kontakt</h2>
          <p><strong>${escapeHtml(property.contact_name || "Kontaktperson")}</strong></p>
          <p>${escapeHtml(property.contact_email || "")}</p>
          <p>${escapeHtml(property.contact_phone || "")}</p>
          ${property.contact_email ? `<a class="primary-link" href="mailto:${escapeHtml(property.contact_email)}">Send e-post</a>` : ""}
        </aside>
      `;

      setupImageSlider();
    }

    function setupImageSlider() {
      const slider = document.getElementById("detail-slider");
      const slides = Array.from(document.querySelectorAll(".detail-slide"));
      const thumbs = Array.from(document.querySelectorAll(".detail-thumb"));
      const arrows = Array.from(document.querySelectorAll(".detail-arrow"));

      if (!slider || !slides.length || !thumbs.length) {
        return;
      }

      function getCurrentIndex() {
        return Math.max(0, Math.min(slides.length - 1, Math.round(slider.scrollLeft / slider.clientWidth)));
      }

      function setActiveThumb() {
        const currentIndex = getCurrentIndex();
        thumbs.forEach((thumb, index) => {
          thumb.classList.toggle("active", index === currentIndex);
        });
        arrows.forEach((arrow) => {
          const direction = Number(arrow.dataset.direction);
          arrow.disabled = direction < 0 ? currentIndex === 0 : currentIndex === slides.length - 1;
        });
      }

      function goToSlide(index) {
        const nextIndex = Math.max(0, Math.min(slides.length - 1, index));
        slides[nextIndex]?.scrollIntoView({
          behavior: "smooth",
          block: "nearest",
          inline: "start"
        });
      }

      let frame = null;

      slider.addEventListener("scroll", () => {
        window.cancelAnimationFrame(frame);
        frame = window.requestAnimationFrame(setActiveThumb);
      }, { passive: true });

      thumbs.forEach((thumb) => {
        thumb.addEventListener("click", () => {
          const index = Number(thumb.dataset.slide);
          goToSlide(index);
        });
      });

      arrows.forEach((arrow) => {
        arrow.addEventListener("click", () => {
          const direction = Number(arrow.dataset.direction);
          goToSlide(getCurrentIndex() + direction);
        });
      });

      setActiveThumb();
    }

    loadProperty();
  </script>
</body>
</html>
