<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logg inn | Boport</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-page {
      max-width: 560px;
      margin: 72px auto;
      padding: 0 20px;
    }

    .auth-card {
      background: #fff;
      border: 1px solid #dfe7e5;
      border-radius: 18px;
      box-shadow: 0 18px 45px rgba(26, 46, 51, 0.08);
      padding: 32px;
    }

    .auth-card label {
      color: #61727a;
      display: grid;
      font-weight: 700;
      gap: 8px;
      margin-bottom: 16px;
    }

    .auth-card input {
      border: 1px solid #dfe7e5;
      border-radius: 10px;
      font: inherit;
      font-weight: 700;
      padding: 16px;
      width: 100%;
    }

    .auth-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
    }

    .auth-message {
      font-weight: 700;
      margin-top: 18px;
    }

    .auth-message.error {
      color: #b83224;
    }

    .auth-message.success {
      color: #1b8068;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html" aria-label="Boport startside">
      <span class="logo-mark">B</span>
      <span>Boport</span>
    </a>
    <nav class="main-nav" aria-label="Hovedmeny">
      <a href="index.html">Forside</a>
      <a href="mine-annonser.html">Mine annonser</a>
      <a href="legg-ut-bolig.html">Legg ut bolig</a>
    </nav>
  </header>

  <main class="auth-page">
    <section class="auth-card">
      <p class="eyebrow">Boport konto</p>
      <h1>Logg inn</h1>
      <p>Logg inn for å legge ut og redigere dine egne annonser.</p>

      <form id="login-form">
        <label>
          E-post
          <input id="email" type="email" autocomplete="email" required placeholder="navn@epost.no">
        </label>

        <label>
          Passord
          <input id="password" type="password" autocomplete="current-password" required minlength="6" placeholder="Minst 6 tegn">
        </label>

        <div class="auth-actions">
          <button class="search-button" type="submit">Logg inn</button>
          <button class="secondary-link" id="signup-button" type="button">Opprett konto</button>
        </div>

        <p id="login-message" class="auth-message"></p>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script>
    const client = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY);
    const form = document.getElementById("login-form");
    const signupButton = document.getElementById("signup-button");
    const message = document.getElementById("login-message");
    const params = new URLSearchParams(window.location.search);
    const redirectTo = params.get("redirect") || "mine-annonser.html";

    function setMessage(text, type = "") {
      message.textContent = text;
      message.className = `auth-message ${type}`;
    }

    async function redirectIfLoggedIn() {
      const { data } = await client.auth.getSession();

      if (data.session?.user) {
        window.location.href = redirectTo;
      }
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      setMessage("Logger inn...");

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const { error } = await client.auth.signInWithPassword({ email, password });

      if (error) {
        setMessage(`Kunne ikke logge inn: ${error.message}`, "error");
        return;
      }

      setMessage("Innlogget. Sender deg videre...", "success");
      window.location.href = redirectTo;
    });

    signupButton.addEventListener("click", async () => {
      setMessage("Oppretter konto...");

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        setMessage("Fyll inn e-post og passord først.", "error");
        return;
      }

      const { error } = await client.auth.signUp({
        email,
        password,
        options: {
          emailRedirectTo: "https://godtfred1000.github.io/boport/auth-callback.html"
        }
      });

      if (error) {
        setMessage(`Kunne ikke opprette konto: ${error.message}`, "error");
        return;
      }

      setMessage("Konto er opprettet. Sjekk e-posten din og trykk på bekreftelseslenken.", "success");
    });

    redirectIfLoggedIn();
  </script>
</body>
</html>
